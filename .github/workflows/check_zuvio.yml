name: Zuvio 排程監控

on:
  schedule:
    # 2,3 是週二週三，1 是週一（為了你現在測試）
    # 15 是 UTC 時間，對應台北時間 23:00
    - cron: "* 2-5,9-11,15 * * 1,2,3" 
  workflow_dispatch: # 保留手動觸發功能
jobs:
  build:
    runs-on: ubuntu-latest
    # 新增權限設定，確保 Action 有權讀取倉庫內容
    permissions:
      contents: read
    steps:
      - name: 複製程式碼
        uses: actions/checkout@v4 # 更新到 v4

      - name: 設定 Python
        uses: actions/setup-python@v5 # 更新到 v5
        with:
          python-version: '3.9'

      - name: 安裝套件
        run: pip install requests

      - name: 執行監控腳本
        env:
          ZUVIO_EMAIL: ${{ secrets.ZUVIO_EMAIL }}
          ZUVIO_PASSWORD: ${{ secrets.ZUVIO_PASSWORD }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor.py
