name: Zuvio_Auto_Check

on:
  workflow_dispatch:  # 保留手動觸發 (Cron-job 用)
  # 拿掉原本的 GitHub 內建 schedule，全部交給外部 Cron-job，減少衝突

permissions:
  contents: read

jobs:
  check-in:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 升級到 v4 更穩定

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Monitor
        env:
          ZUVIO_EMAIL: ${{ secrets.ZUVIO_EMAIL }}
          ZUVIO_PASSWORD: ${{ secrets.ZUVIO_PASSWORD }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor.py
