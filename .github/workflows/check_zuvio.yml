name: Zuvio_Robot

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 9-11 * * 2,3"

jobs:
  check-in:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Script
        env:
          ZUVIO_EMAIL: ${{ secrets.ZUVIO_EMAIL }}
          ZUVIO_PASSWORD: ${{ secrets.ZUVIO_PASSWORD }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          pip install requests
          python monitor.py
